<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
</head>

<body>
    <div class="main">
        <div class="newscoremain">
            <section class="nevscore" id="highscore">
               <h5 class="textfornev">High Score: 0</h5> 
            </section>
            <section class="nevscore" id="score">
               <h5 class="textfornev">Score: 0</h5> 
            </section>
            <section class="nevscore" id="Time">
               <h5 class="textfornev">Time: 00-00</h5>
            </section>
        </div>

        <section class="board"></section>
 
        <div class="modal">
            <div class="start-game">
                <h3>The Snake Game</h3>
                <button class="start-btn btn">Start Game</button>
            </div>
            <div class="Game-over">
                  <h3>Game Over</h3>
                  <h5 class="writeyourscore">Your Score: </h5>
                  <h5 class="Highscore">High Score: </h5>
                <button class="restart-btn btn">Restart Game</button>
            </div>
        </div>
    </div>
</body>

<link rel="stylesheet" href="script.css">
<script src="script.js"></script>

</html>
